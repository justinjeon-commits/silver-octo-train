<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="왕의 성배">
<meta name="theme-color" content="#1a1025">
<title>왕의 성배</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1025; --bg2: #241535; --bg3: #2e1a42;
    --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    --text: #f0e8ff; --text2: #b09ccc; --text3: #7a6890;
    --accent: #9b6dff; --accent2: #c4a0ff;
    --red: #ff6b7a; --gold: #f5c842;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100dvh; }
  .screen { display: none; flex-direction: column; min-height: 100dvh; padding: 1rem; }
  .screen.active { display: flex; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0 1rem; }
  .top-bar h1 { font-size: 20px; font-weight: 600; }
  .icon-btn { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--text2); font-size: 13px; cursor: pointer; }
  .icon-btn:active { background: var(--border); }

  .chalice-area { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 16px; padding: 1rem; display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
  .chalice-icon { font-size: 32px; }
  .chalice-info { flex: 1; }
  .chalice-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .chalice-bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .chalice-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--gold)); transition: width 0.4s; }
  .chalice-count { font-size: 20px; font-weight: 600; color: var(--gold); }

  .remain-label { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 1rem; }
  .remain-label span { color: var(--accent2); font-weight: 600; }

  .deck-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
  .deck-stack { position: relative; width: 160px; height: 224px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .deck-stack .layer { position: absolute; width: 160px; height: 224px; border-radius: 16px; border: 0.5px solid var(--border2); background: var(--bg2); }
  .deck-stack .layer:nth-child(1) { transform: translate(-4px,-4px); }
  .deck-stack .layer:nth-child(2) { transform: translate(-2px,-2px); }
  .deck-stack .top-card { position: absolute; width: 160px; height: 224px; border-radius: 16px; border: 1.5px solid var(--accent); background: var(--bg3); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; transition: transform 0.15s, box-shadow 0.15s; }
  .deck-stack:hover .top-card { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(155,109,255,0.25); }
  .deck-stack:active .top-card { transform: scale(0.93); }
  .deck-back-pattern { font-size: 52px; opacity: 0.5; }
  .deck-back-label { font-size: 13px; color: var(--text3); }
  .deck-empty { width: 160px; height: 224px; border-radius: 16px; border: 1.5px dashed var(--border2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text3); font-size: 14px; }
  .deck-empty span { font-size: 36px; opacity: 0.4; }

  .last-drawn { display: flex; align-items: center; gap: 10px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 10px 14px; width: 100%; opacity: 0; transition: opacity 0.3s; }
  .last-drawn.show { opacity: 1; }
  .last-drawn-suit { font-size: 22px; }
  .last-drawn-info { flex: 1; }
  .last-drawn-rank { font-size: 14px; font-weight: 600; }
  .last-drawn-spell { font-size: 12px; color: var(--text3); }
  .last-drawn-btn { font-size: 12px; color: var(--accent2); cursor: pointer; background: none; border: 0.5px solid var(--accent); border-radius: 8px; padding: 5px 10px; }

  .btn { flex: 1; padding: 12px; border-radius: 12px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .btn:active { background: var(--bg3); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:active { background: #7a50e0; }
  .bottom-row { display: flex; gap: 8px; padding: 1rem 0 0.5rem; margin-top: auto; }

  /* ===== REVEAL OVERLAY ===== */
  #reveal-overlay { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 1.25rem; overflow-y: auto; }
  #reveal-overlay.active { display: flex; }
  #reveal-bg { position: fixed; inset: 0; z-index: 99; background: rgba(10,4,20,0.9); backdrop-filter: blur(6px); animation: bgFadeIn 0.3s ease; pointer-events: none; display: none; }
  @keyframes bgFadeIn { from{opacity:0} to{opacity:1} }

  #particle-canvas { position: fixed; inset: 0; z-index: 100; pointer-events: none; }

  .reveal-card { position: relative; z-index: 101; width: 180px; height: 252px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; perspective: 800px; }
  .reveal-card-inner { width: 100%; height: 100%; border-radius: 20px; transform-style: preserve-3d; animation: flip3d 0.55s cubic-bezier(0.23,1,0.32,1) forwards; }
  @keyframes flip3d { 0%{transform:rotateY(180deg) scale(0.7);opacity:0.2} 60%{transform:rotateY(-8deg) scale(1.05);opacity:1} 80%{transform:rotateY(4deg) scale(1.02)} 100%{transform:rotateY(0deg) scale(1)} }
  .reveal-card-front { position: absolute; inset: 0; border-radius: 20px; border: 1.5px solid var(--border2); background: var(--bg2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; backface-visibility: hidden; }
  .big-suit { font-size: 56px; line-height: 1; }
  .big-rank { font-size: 26px; font-weight: 700; }
  .suit-red { color: var(--red); }
  .suit-black { color: var(--text); }
  .reveal-card-front.glow-red  { animation: glowRed 0.6s 0.5s ease forwards; }
  .reveal-card-front.glow-black{ animation: glowBlack 0.6s 0.5s ease forwards; }
  .reveal-card-front.glow-king { animation: glowKing 0.7s 0.4s ease forwards; }
  @keyframes glowRed   { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 40px 10px rgba(255,107,122,0.45)} }
  @keyframes glowBlack { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 40px 10px rgba(155,109,255,0.45)} }
  @keyframes glowKing  { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 60px 20px rgba(245,200,66,0.55)} }

  /* 룰 박스 */
  .spell-box { position: relative; z-index: 101; width: 100%; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; animation: slideUp 0.45s 0.35s cubic-bezier(0.23,1,0.32,1) both; }
  @keyframes slideUp { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }

  /* 일러스트 영역 */
  .spell-illustration { width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; background: var(--bg3); border-bottom: 0.5px solid var(--border); }
  .spell-illustration svg { width: 100px; height: 90px; }

  .spell-content { padding: 1rem 1.25rem; text-align: center; }
  .spell-name { font-size: 18px; font-weight: 600; color: var(--accent2); margin-bottom: 6px; }
  .spell-rule { font-size: 13px; color: var(--text2); line-height: 1.8; }

  .king-warning { position: relative; z-index: 101; background: rgba(245,200,66,0.12); border: 0.5px solid var(--gold); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--gold); text-align: center; animation: slideUp 0.4s 0.5s both; }
  .reveal-close-btn { position: relative; z-index: 101; width: 100%; padding: 14px; border-radius: 12px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; animation: slideUp 0.4s 0.55s both; -webkit-tap-highlight-color: transparent; }
  .reveal-close-btn:active { background: var(--bg3); }

  #flash { position: fixed; inset: 0; z-index: 200; pointer-events: none; opacity: 0; }
  #flash.red    { background: rgba(255,107,122,0.18); animation: flashAnim 0.35s ease; }
  #flash.gold   { background: rgba(245,200,66,0.22); animation: flashAnim 0.45s ease; }
  #flash.purple { background: rgba(155,109,255,0.18); animation: flashAnim 0.35s ease; }
  @keyframes flashAnim { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }

  /* === EDIT === */
  #screen-edit { gap: 0; }
  .edit-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 1rem; }
  .edit-row { display: flex; gap: 10px; align-items: flex-start; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 10px 12px; }
  .rank-badge { min-width: 38px; height: 38px; border-radius: 8px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--accent2); flex-shrink: 0; }
  .edit-fields { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .edit-fields input, .edit-fields textarea { width: 100%; font-family: inherit; font-size: 13px; color: var(--text); background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px; padding: 7px 10px; outline: none; }
  .edit-fields input:focus, .edit-fields textarea:focus { border-color: var(--accent); }
  .edit-fields textarea { resize: vertical; min-height: 52px; line-height: 1.6; }
  .edit-bottom { display: flex; gap: 8px; padding-top: 0.75rem; }
</style>
</head>
<body>
<div id="flash"></div>
<canvas id="particle-canvas"></canvas>

<div id="app">
  <!-- MAIN -->
  <div id="screen-main" class="screen active">
    <div class="top-bar">
      <span style="font-size:22px">👑</span>
      <h1>왕의 성배</h1>
      <button class="icon-btn" onclick="goEdit()">룰 편집</button>
    </div>
    <div class="chalice-area">
      <span class="chalice-icon">🏆</span>
      <div class="chalice-info">
        <div class="chalice-label">성배에 모인 왕</div>
        <div class="chalice-bar-bg"><div class="chalice-bar-fill" id="kings-bar" style="width:0%"></div></div>
      </div>
      <div class="chalice-count"><span id="kings-count">0</span>/4</div>
    </div>
    <div class="remain-label">남은 카드 <span id="remain-count">52</span>장</div>
    <div class="deck-area">
      <div id="deck-stack-wrap"></div>
      <div class="last-drawn" id="last-drawn">
        <span class="last-drawn-suit" id="ld-suit"></span>
        <div class="last-drawn-info">
          <div class="last-drawn-rank" id="ld-rank"></div>
          <div class="last-drawn-spell" id="ld-spell"></div>
        </div>
        <button class="last-drawn-btn" onclick="showReveal()">다시 보기</button>
      </div>
    </div>
    <div class="bottom-row">
      <button class="btn" onclick="resetGame()">새 게임</button>
    </div>
  </div>

  <!-- REVEAL OVERLAY -->
  <div id="reveal-bg"></div>
  <div id="reveal-overlay">
    <div class="reveal-card">
      <div class="reveal-card-inner">
        <div class="reveal-card-front" id="reveal-card-front">
          <span class="big-suit" id="reveal-suit"></span>
          <span class="big-rank" id="reveal-rank"></span>
        </div>
      </div>
    </div>
    <div class="spell-box">
      <div class="spell-illustration" id="reveal-illustration"></div>
      <div class="spell-content">
        <div class="spell-name" id="reveal-spell-name"></div>
        <div class="spell-rule" id="reveal-spell-rule"></div>
      </div>
    </div>
    <div class="king-warning" id="king-warning" style="display:none">⚠️ 네 번째 왕! 성배를 모두 마셔야 합니다!</div>
    <button class="reveal-close-btn" onclick="closeReveal()">← 테이블로 돌아가기</button>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="screen" style="align-items:center;justify-content:center;gap:1.5rem;text-align:center;">
    <div style="font-size:72px">💀</div>
    <div>
      <div style="font-size:24px;font-weight:600;color:var(--gold);margin-bottom:8px">저주의 성배 완성!</div>
      <div style="font-size:14px;color:var(--text2);line-height:1.8">네 번째 왕이 소환되었습니다.<br>성배를 마신 자여, 왕국에 경의를.</div>
    </div>
    <div style="width:100%;display:flex;gap:8px;">
      <button class="btn primary" style="flex:1" onclick="resetGame()">새 게임 시작</button>
    </div>
  </div>

  <!-- EDIT -->
  <div id="screen-edit" class="screen">
    <div class="top-bar" style="padding-bottom:1rem">
      <span style="font-size:18px">✏️</span>
      <h1>룰 편집</h1>
      <div style="width:60px"></div>
    </div>
    <div class="edit-scroll" id="edit-list"></div>
    <div class="edit-bottom">
      <button class="btn" onclick="resetRules()">기본값</button>
      <button class="btn primary" onclick="saveEdit()">저장</button>
      <button class="btn" onclick="goMain()">취소</button>
    </div>
  </div>
</div>

function loadRules() {
  try { const s = localStorage.getItem('kings_cup_rules'); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_RULES)); }
  catch(e) { return JSON.parse(JSON.stringify(DEFAULT_RULES)); }
}
function saveRules() { try { localStorage.setItem('kings_cup_rules', JSON.stringify(rules)); } catch(e) {} }

let rules = loadRules();
let deck = [], kingsDrawn = 0, lastCard = null, isAnimating = false;

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function buildDeck() { const d=[]; SUITS.forEach(s=>RANKS.forEach(r=>d.push({suit:s,rank:r}))); return shuffle(d); }

function show(id) { document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active')); const el=document.getElementById(id); if(el)el.classList.add('active'); }
function goMain() { closeReveal(); renderDeck(); show('screen-main'); }
function goEdit() { renderEdit(); show('screen-edit'); }
function showReveal() { if(!lastCard)return; document.getElementById('reveal-bg').style.display='block'; document.getElementById('reveal-overlay').classList.add('active'); }

/* 파티클 */
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particles=[], animId=null;
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas); resizeCanvas();

function spawnParticles(isKing) {
  particles=[];
  const colors=isKing?['#f5c842','#ffec80','#e8a000','#fff5a0','#ff6b7a']:['#9b6dff','#c4a0ff','#ff6b7a','#ffffff','#f5c842'];
  const cx=window.innerWidth/2, cy=window.innerHeight*0.32, count=isKing?120:70;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2, speed=isKing?(3+Math.random()*9):(2+Math.random()*6);
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-(isKing?4:2),r:isKing?(3+Math.random()*5):(2+Math.random()*4),color:colors[Math.floor(Math.random()*colors.length)],alpha:1,gravity:0.18+Math.random()*0.1,life:1,decay:0.012+Math.random()*0.018,shape:isKing&&Math.random()>0.5?'star':'circle'});
  }
  if(animId)cancelAnimationFrame(animId);
  animateParticles();
}
function drawStar(cx,cy,r){ctx.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2,b=(i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.lineTo(cx+(r*0.4)*Math.cos(b),cy+(r*0.4)*Math.sin(b));}ctx.closePath();}
function animateParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.alpha>0.02);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.99;p.life-=p.decay;p.alpha=Math.max(0,p.life);ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;if(p.shape==='star'){drawStar(p.x,p.y,p.r);ctx.fill();}else{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}ctx.restore();});if(particles.length>0)animId=requestAnimationFrame(animateParticles);else ctx.clearRect(0,0,canvas.width,canvas.height);}

function flash(type){const el=document.getElementById('flash');el.className=type;setTimeout(()=>el.className='',500);}

function drawCard() {
  if(deck.length===0||isAnimating)return;
  isAnimating=true;
  const card=deck.pop(); lastCard=card;
  const isKing=card.rank==='K';
  if(isKing)kingsDrawn=Math.min(4,kingsDrawn+1);
  const ruleObj=rules[card.rank]||{name:'???',rule:'규칙 없음'};
  const isLastKing=isKing&&kingsDrawn===4;
  const isRed=card.suit.cls==='suit-red';

  document.getElementById('reveal-suit').textContent=card.suit.sym;
  document.getElementById('reveal-suit').className='big-suit '+card.suit.cls;
  document.getElementById('reveal-rank').textContent=card.rank;
  document.getElementById('reveal-rank').className='big-rank '+card.suit.cls;
  document.getElementById('reveal-spell-name').textContent=ruleObj.name;
  document.getElementById('reveal-spell-rule').textContent=ruleObj.rule;
  document.getElementById('king-warning').style.display=isLastKing?'block':'none';
  document.getElementById('reveal-illustration').innerHTML=ILLUSTRATIONS[card.rank]||'';

  const front=document.getElementById('reveal-card-front');
  front.className='reveal-card-front '+(isKing?'glow-king':isRed?'glow-red':'glow-black');
  const inner=document.querySelector('.reveal-card-inner');
  inner.style.animation='none';
  requestAnimationFrame(()=>{ inner.style.animation=''; inner.style.animation='flip3d 0.55s cubic-bezier(0.23,1,0.32,1) forwards'; });

  document.getElementById('reveal-bg').style.display='block';
  document.getElementById('reveal-overlay').classList.add('active');

  flash(isKing?'gold':isRed?'red':'purple');
  setTimeout(()=>spawnParticles(isKing),250);

  document.getElementById('ld-suit').textContent=card.suit.sym;
  document.getElementById('ld-suit').className='last-drawn-suit '+card.suit.cls;
  document.getElementById('ld-rank').textContent=card.rank+' '+card.suit.sym;
  document.getElementById('ld-spell').textContent=ruleObj.name;
  document.getElementById('last-drawn').classList.add('show');

  renderDeckCount();
  setTimeout(()=>{isAnimating=false;},600);
  if(isLastKing)setTimeout(showGameOver,2000);
}

function closeReveal(){document.getElementById('reveal-overlay').classList.remove('active');document.getElementById('reveal-bg').style.display='none';if(animId){cancelAnimationFrame(animId);ctx.clearRect(0,0,canvas.width,canvas.height);}renderDeck();}
function showGameOver(){document.getElementById('reveal-overlay').classList.remove('active');document.getElementById('reveal-bg').style.display='none';show('screen-gameover');}

function renderDeckCount(){document.getElementById('remain-count').textContent=deck.length;document.getElementById('kings-count').textContent=kingsDrawn;document.getElementById('kings-bar').style.width=(kingsDrawn/4*100)+'%';}
function renderDeck(){
  const wrap=document.getElementById('deck-stack-wrap'); renderDeckCount();
  if(deck.length===0){wrap.innerHTML=`<div class="deck-empty"><span>🃏</span>모든 카드가 소진됐습니다</div>`;return;}
  wrap.innerHTML=`<div class="deck-stack" onclick="drawCard()"><div class="layer"></div><div class="layer"></div><div class="top-card"><span class="deck-back-pattern">🔮</span><span class="deck-back-label">카드를 뽑으세요</span></div></div>`;
}

function renderEdit(){
  const list=document.getElementById('edit-list'); list.innerHTML='';
  RANKS.forEach(r=>{
    const row=document.createElement('div'); row.className='edit-row';
    row.innerHTML=`<div class="rank-badge">${r}</div><div class="edit-fields"><input type="text" id="en-${r}" value="${(rules[r]?.name||'').replace(/"/g,'&quot;')}" placeholder="주문 이름"><textarea id="er-${r}" placeholder="규칙 설명">${rules[r]?.rule||''}</textarea></div>`;
    list.appendChild(row);
  });
}
function saveEdit(){RANKS.forEach(r=>{const n=document.getElementById('en-'+r),ru=document.getElementById('er-'+r);if(n&&ru)rules[r]={name:n.value,rule:ru.value};});saveRules();goMain();}
function resetRules(){if(confirm('기본 룰로 초기화할까요?')){rules=JSON.parse(JSON.stringify(DEFAULT_RULES));saveRules();renderEdit();}}
function resetGame(){if(confirm('새 게임을 시작할까요?')){deck=buildDeck();kingsDrawn=0;lastCard=null;document.getElementById('last-drawn').classList.remove('show');renderDeck();show('screen-main');}}

deck=buildDeck(); renderDeck();
</script>
